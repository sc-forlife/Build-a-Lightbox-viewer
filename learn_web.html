<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="learn_web.css" />
    <title>Lightbox Viewer</title>
  </head>
  <body>
    <div class="title"><h1>Museum Gallery</h1></div>
    <div class="gallery">
      <img
        class="gallery-item"
        src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg"
        alt=""
      />
      <img
        class="gallery-item"
        src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg"
        alt=""
      />
      <img
        class="gallery-item"
        src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg"
        alt=""
      />
    </div>
    <div class="lightbox">
      <img id="lightbox-image" src="-thumbnail" alt="" />
      <button id="close-btn"><span id="times">&times;</span></button>
    </div>
  </body>
  <script src="learn_web.js"></script>
</html>
